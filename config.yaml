proxy-providers:
  all:
    url: "http://speedtest.arm.wensitang.site:3001/share/col/all?token=Sbt0vmvwek5oYlLigXXxK"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连


# 节点信息
proxies:
  - {name: 直连, type: direct}
  - {name: 🇯🇵 日本_vmess_zj, server: 147.79.20.181, port: 12678, type: vmess, uuid: 2cf8b593-24a8-47a0-a5ef-dc9a35792fd5, alterId: 0, cipher: auto, tls: true, skip-cert-verify: true, servername: www.apple.com, network: ws, ws-opts: {path: /abvdsd}, tfo: false, dialer-proxy: 🇭🇰 香港_vmess_zj}
  - {name: 🇭🇰 香港_vmess_zj, server: 199.48.247.102, port: 50786, type: vmess, uuid: 0b008676-4efc-471d-be73-7e11b076ccf5, alterId: 0, cipher: auto, tls: true, skip-cert-verify: true, servername: www.apple.com, tfo: false}
# 全局配置 
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 为防止使用插件朋友遇到面板问题，我注释掉了此模块。
external-controller: 0.0.0.0:9090
secret: ""
external-ui: ui
external-ui-name: zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 嗅探（fakeip下其实可以不用嗅探）
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# 入站
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  #使用nikki，混入全部不修改的情况，开启接口指定为nikki
  #device: nikki
  #使用仅内核自行修改下面三项为true
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# DNS模块
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
 
# 出站策略，根据自己情况调整每个策略里分组排序，增删都可以，比如把美国自动放到第一个，比如删除香港故转，注意别漏掉表情逗号等。
# 如果相应分组没有筛选到对应的国家，请根据自己节点名字调整筛选关键字。
# 没有再使用锚点，是考虑很多新手修改难度，这样新手修改某个分组更容易些。
proxy-groups:
  - {name: 🌐 手动选择, type: select, include-all: true, filter: "^(?!.*(过滤|直连|港|新|日|美|家|官网|剩余|流量|套餐|到期|重置)).*$"}
  - {name: 🎥 NETFLIX节点, type: fallback, include-all: true, filter: "^(?=.*(🇭🇰 香港_vmess_zj|.*yyss.*?新加坡|.*yyss.*?香港|.*yyss.*?美国)).*$"}
  - {name: 🎥 zzsj_NETFLIX节点, type: url-test, hidden: true, include-all: true, filter: "^(?=.*(|NETFLIX|Netflix)).*$", url: http://www.gstatic.com/generate_204}
  - {name: 🚀 自建节点, type: fallback, hidden: true, proxies: [🇭🇰 香港_vmess_zj, 🇯🇵 日本_vmess_zj]}
  - {name: ✈️ zzsj节点, type: url-test, hidden: true, include-all: true, interval: 300, filter: "^(?=.*zzsj).*$", url: http://www.gstatic.com/generate_204}
  - {name: ✈️ mj节点, type: url-test, hidden: true, include-all: true, interval: 300, filter: "^(?=.*mj).*$", url: http://www.gstatic.com/generate_204}
  - {name: ✈️ yyss节点, type: url-test, hidden: true, include-all: true, interval: 300, filter: "^(?=.*yyss).*$", url: http://www.gstatic.com/generate_204}
  - {name: ♻️ 自动选择, type: url-test, interval: 300, proxies: [🚀 自建节点, ✈️ zzsj节点, ✈️ mj节点, ✈️ yyss节点], url: http://www.gstatic.com/generate_204}
  - {name: 🤖 AI, type: url-test, include-all: true, interval: 300, filter: "^(?=.*(Gemini|GPT)).*$", url: http://www.gstatic.com/generate_204}
  - {name: 🤖 Gemini, type: url-test, include-all: true, interval: 300, filter: "^(?=.*Gemini)(?=.*(新|美)).*$", url: http://www.gstatic.com/generate_204}
